name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (Gradle, JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Dockerfile과 동일한 빌드 단계 — 성공하면 Docker 이미지 빌드도 통과함
      - name: Build shadow JAR
        run: ./gradlew :kotlin-server:shadowJar --no-daemon --stacktrace

  compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ${VAR:?} 필수 변수를 채우기 위한 더미 .env (검증 전용, 실제 값 아님)
      - name: Create dummy .env
        run: |
          cat > .env <<'EOF'
          DB_PASSWORD=dummy
          OLLAMA_MODEL=nomic-embed-text
          EMBEDDING_DIMENSIONS=768
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=dummy
          MINIO_READONLY_KEY=mcp-readonly
          MINIO_READONLY_SECRET=dummy
          MINIO_UPLOAD_KEY=pdf-uploader
          MINIO_UPLOAD_SECRET=dummy
          MINIO_API_DOMAIN=files.example.com
          MINIO_CONSOLE_DOMAIN=console.example.com
          MINIO_SERVER_URL=https://files.example.com
          MINIO_BROWSER_REDIRECT_URL=https://console.example.com
          EOF

      - name: Validate compose config (production file)
        run: docker compose -f docker-compose.yml config -q
